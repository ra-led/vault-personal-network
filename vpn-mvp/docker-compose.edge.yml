services:
  wireguard:
    image: linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - wireguard_data:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "8081:8081"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  edge-agent:
    build: ./edge_agent
    env_file:
      - .env.edge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - NET_ADMIN
    volumes:
      - edge_agent_state:/var/lib/edge-agent
    depends_on:
      - wireguard
    network_mode: "service:wireguard"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  wireguard_data:
  edge_agent_state:
