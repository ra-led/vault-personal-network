services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vpn_website
      - POSTGRES_USER=vpn
      - POSTGRES_PASSWORD=vpn
    volumes:
      - postgres_data:/var/lib/postgresql/data

  website:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8080
      - DATABASE_URL=${WEBSITE_DATABASE_URL:-postgresql://vpn:vpn@postgres:5432/vpn_website}
      - TRUST_PROXY=1
      - CONTROL_PLANE_API_URL=${CONTROL_PLANE_API_URL:-http://host.docker.internal:8000}
      - CONTROL_PLANE_INTERNAL_TOKEN=${CONTROL_PLANE_INTERNAL_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEBSITE_PORT:-8080}:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
